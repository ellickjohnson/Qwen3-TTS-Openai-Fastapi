version: '3.8'

services:
  qwen3-tts-api:
    image: mosstnslv/qwen-tts-service:latest
    container_name: qwen3-tts-api
    runtime: nvidia
    ports:
      - "8188:8188"
    environment:
      - PYTHONUNBUFFERED=1
      - QWEN3_TTS_ATTN_IMPLEMENTATION=flash_attention_2
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_PATH=/app/models
      - SAMPLING_RATE=24000
    volumes:
      - qwen3-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  qwen3-models:
