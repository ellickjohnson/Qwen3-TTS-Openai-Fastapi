version: '3.8'

services:
  qwen3-tts-api:
    image: spaceinvaderone/qwen3-tts:latest
    container_name: qwen3-tts-api
    runtime: nvidia
    ports:
      - "7860:7860"
      - "8880:8880"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TTS_MODEL_NAME=Qwen/Qwen3-TTS-12Hz-1.7B-Base
    volumes:
      - qwen3-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qwen3-models:
